name: Scrape KNBSB resultaten

on:
  schedule:
    - cron: '*/30 * * * *'  # elke 30 minuten
  workflow_dispatch:         # handmatig starten

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installeer dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape resultaten
        run: python scrape.py

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add resultaten.json
          git diff --staged --quiet || git commit -m "Update resultaten"
          git push
